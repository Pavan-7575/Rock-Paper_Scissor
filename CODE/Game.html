<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="Game.css" type="text/css" />
</head>

<body>
    <header>
        <h1>Rock Paper Scissors</h1>
    </header>
    <div class="score-board">
        <div id="user-label" class="badge">user</div>
        <div id="computer-label" class="badge">comp</div>
        <span id="user-score">0</span> : <span id="computer-score">0</span>
    </div>
    <div class="result">
        <p id="result-text">Make your move after starting the game.</p>
    </div>
    <div class="buttons">
        <button id="start-btn">Start Game</button>
        <button id="end-btn">End Game</button>
    </div>
    <div class="choices disabled">
        <div id="rock" class="choice">
            <img width="48" height="48" src="../ASSETS/1.png" />
        </div>
        <div id="paper" class="choice">
            <img width="48" height="48" src="../ASSETS/2.png" />
        </div>
        <div id="scissors" class="choice">
            <img width="48" height="48" src="../ASSETS/3.png" />
        </div>
        <p id="action-message">Make your move.</p>
    </div>
    <script src="Game.js" type="text/javascript"></script>
</body>

</html>
